<!DOCTYPE html>

<ui:composition
        template="/template.xhtml"
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:define name="contenido">

        <h2>Administración de Socios</h2>

        <h:form id="frmSocio">

            <!-- Mensajes -->

            <h:messages id="mensaje"
                        globalOnly="true"
                        showDetail="true"
                        styleClass="mensajes"/>

            <!-- Registro -->

            <fieldset>

                <legend>Registro de Socios</legend>

                <h:panelGrid columns="2" cellpadding="8">

                    <h:outputLabel for="codigo" value="Código"/>

                    <h:inputText id="codigo"
                                 value="#{socioBean.socio.id}"
                                 readonly="true"/>

                    <h:outputLabel for="persona" value="Persona"/>

                    <h:selectOneMenu id="persona"
                                     value="#{socioBean.personaSeleccionada}">

                        <f:selectItem itemLabel="Seleccione una Persona"
                                      itemValue="#{null}"/>

                        <f:selectItems value="#{personaBean.listaPersonas}"
                                       var="p"
                                       itemLabel="#{p.cedula} - #{p.nombre} #{p.apellido}"
                                       itemValue="#{p}"/>

                    </h:selectOneMenu>

                    <h:outputLabel for="direccion" value="Dirección"/>

                    <h:inputText id="direccion"
                                 value="#{socioBean.socio.direccion}"
                                 required="true"/>

                    <h:outputLabel for="telefono" value="Teléfono"/>

                    <h:inputText id="telefono"
                                 value="#{socioBean.socio.telefono}"/>

                    <h:outputLabel for="fecha" value="Fecha de Nacimiento"/>

                    <h:inputText id="fecha"
                                 value="#{socioBean.socio.fechaNacimiento}">

                        <f:convertDateTime pattern="dd/MM/yyyy"/>

                    </h:inputText>

                </h:panelGrid>

                <br/>

                <h:commandButton value="Guardar"
                                 action="#{socioBean.guardar}"
                                 styleClass="btnGuardar"/>

                <h:commandButton value="Nuevo"
                                 action="#{socioBean.nuevo}"
                                 immediate="true"
                                 styleClass="btnNuevo"/>

            </fieldset>

            <br/>

            <!-- Listado -->

            <fieldset>

                <legend>Listado de Socios</legend>

                <h:dataTable value="#{socioBean.listaSocios}"
                             var="s"
                             styleClass="tabla"
                             headerClass="cabecera"
                             rowClasses="filaPar,filaImpar">

                    <h:column>

                        <f:facet name="header">ID</f:facet>

                        #{s.id}

                    </h:column>

                    <h:column>

                        <f:facet name="header">Cédula</f:facet>

                        #{s.persona.cedula}

                    </h:column>

                    <h:column>

                        <f:facet name="header">Nombre</f:facet>

                        #{s.persona.nombre}

                    </h:column>

                    <h:column>

                        <f:facet name="header">Apellido</f:facet>

                        #{s.persona.apellido}

                    </h:column>

                    <h:column>

                        <f:facet name="header">Dirección</f:facet>

                        #{s.direccion}

                    </h:column>

                    <h:column>

                        <f:facet name="header">Teléfono</f:facet>

                        #{s.telefono}

                    </h:column>

                    <h:column>

                        <f:facet name="header">Fecha Nacimiento</f:facet>

                        <h:outputText value="#{s.fechaNacimiento}">

                            <f:convertDateTime pattern="dd/MM/yyyy"/>

                        </h:outputText>

                    </h:column>

                    <h:column>

                        <f:facet name="header">Edad</f:facet>

                        #{s.calcularEdad()}

                    </h:column>

                    <h:column>

                        <f:facet name="header">Acciones</f:facet>

                        <h:commandButton value="Editar"
                                         action="#{socioBean.editar(s)}"
                                         styleClass="btnEditar"/>

                        <h:outputText value="  "/>

                        <h:commandButton value="Eliminar"
                                         action="#{socioBean.eliminar(s)}"
                                         styleClass="btnEliminar"
                                         onclick="return confirm('¿Desea eliminar este socio?');"/>

                    </h:column>

                </h:dataTable>

            </fieldset>

        </h:form>

    </ui:define>

</ui:composition>
