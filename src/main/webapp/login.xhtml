<!DOCTYPE html>
<html 
	template="/templates/template.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

<h:head>

    <title>Sistema Bancario</title>

    <h:outputStylesheet library="css" name="login.css"/>

</h:head>

<h:body>

<div class="login-page">

    <div class="login-box">

        <div class="logo">

            <h:graphicImage
                    library="imgs"
                    name="banco.png"
                    width="120"/>

            <h2>SISTEMA BANCARIO</h2>

            <p>Cooperativa de Ahorro y Crédito</p>

        </div>

        <h:form id="frmLogin">

            <p:growl autoUpdate="true"
                     showDetail="true"/>

            <div class="campo">

                <span>Usuario</span>

                <p:inputText
                        value="#{loginBean.usuario}"
                        required="true"/>

            </div>

            <div class="campo">

                <span>Contraseña</span>

                <p:password
                        value="#{loginBean.clave}"
                        feedback="false"
                        required="true"/>

            </div>

            <div class="botones">

                <p:commandButton
                        value="Ingresar"
                        icon="pi pi-sign-in"
                        action=""
                        update="@form"/>

                <p:commandButton
                        value="Limpiar"
                        icon="pi pi-refresh"
                        action="#{loginBean.limpiar()}"
                        process="@this"
                        update="@form"
                        styleClass="ui-button-secondary"/>

            </div>

        </h:form>

    </div>

</div>

</h:body>

</html>
