<!DOCTYPE html>
<html
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">

    <head>

        <h2>Panel Principal</h2>
        <h:outputStylesheet library="css" name="login.css"/>

        <!-- Indicadores -->
	</br>
	</head>
	<body>
        <div class="grid">

            <div class="col-12 md:col-3">

                <h:panelGrid styleClass="dashboard-card">

                    <h3>Socios</h3>

                    <h1>#{dashboardBean.totalSocios}</h1>

                </h:panelGrid>

            </div>

            <div class="col-12 md:col-3">

                <h:panelGrid styleClass="dashboard-card">

                    <h3>Cuentas</h3>

                    <h1>#{dashboardBean.totalCuentas}</h1>

                </h:panelGrid>

            </div>

            <div class="col-12 md:col-3">

                <h:panelGrid styleClass="dashboard-card">

                    <h3>Créditos</h3>

                    <h1>#{dashboardBean.totalCreditos}</h1>

                </h:panelGrid>

            </div>

            <div class="col-12 md:col-3">

                <h:panelGrid styleClass="dashboard-card">

                    <h3>Transacciones</h3>

                    <h1>#{dashboardBean.totalTransacciones}</h1>

                </h:panelGrid>

            </div>

        </div>

        <br/>

        <!-- Totales -->

        <div class="grid">

            <div class="col-12 md:col-6">


                    <h:panelGrid columns="2" cellpadding="8">

                        <h:outputText value="Total Depósitos"/>

                        <h:outputText value="#{dashboardBean.totalDepositos}">
                            <f:convertNumber type="currency" currencySymbol="$"/>
                        </h:outputText>

                        <h:outputText value="Total Retiros"/>

                        <h:outputText value="#{dashboardBean.totalRetiros}">
                            <f:convertNumber type="currency" currencySymbol="$"/>
                        </h:outputText>

                        <h:outputText value="Total Transferencias"/>

                        <h:outputText value="#{dashboardBean.totalTransferencias}">
                            <f:convertNumber type="currency" currencySymbol="$"/>
                        </h:outputText>

                        <h:outputText value="Créditos Activos"/>

                        <h:outputText value="#{dashboardBean.creditosActivos}"/>

                    </h:panelGrid>

            </div>

            <div class="col-12 md:col-6">

                <h:panelGrid header="Accesos Rápidos">

                    <h:commandButton value="Personas"
                                     icon="pi pi-users"
                                     outcome="/persona"
                                     styleClass="ui-button-primary"/>

                    <br/><br/>

                    <h:commandButton value="Socios"
                                     icon="pi pi-id-card"
                                     outcome="/socio"
                                     styleClass="ui-button-success"/>

                    <br/><br/>

                    <h:commandButton value="Cuentas"
                                     icon="pi pi-wallet"
                                     outcome="/cuenta"
                                     styleClass="ui-button-help"/>

                    <br/><br/>

                    <h:commandButton value="Créditos"
                                     icon="pi pi-credit-card"
                                     outcome="/credito"
                                     styleClass="ui-button-warning"/>

                    <br/><br/>

                    <h:commandButton value="Transacciones"
                                     icon="pi pi-money-bill"
                                     outcome="/transaccion"
                                     styleClass="ui-button-info"/>

                </h:panelGrid>

            </div>

        </div>

        <br/>

        <!-- Últimas transacciones -->

        <h:panelGrid header="Últimas Transacciones">

            <h:dataTable value="#{dashboardBean.ultimasTransacciones}"
                         var="t"
                         paginator="true"
                         rows="5">

                <h:column headerText="Fecha">
                    <h:outputText value="#{t.fecha}">
                        <f:convertDateTime pattern="dd/MM/yyyy HH:mm"/>
                    </h:outputText>
                </h:column>

                <h:column headerText="Cuenta">
                    #{t.cuenta.numero}
                </h:column>

                <h:column headerText="Tipo">
                    #{t.tipoTransaccion.nombre}
                </h:column>

                <h:column headerText="Valor">
                    <h:outputText value="#{t.valor}">
                        <f:convertNumber type="currency"
                                         currencySymbol="$"/>
                    </h:outputText>
                </h:column>

            </h:dataTable>

        </h:panelGrid>

</body>

</html>
