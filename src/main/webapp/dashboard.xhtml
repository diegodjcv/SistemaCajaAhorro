<!DOCTYPE html>
<ui:composition
    template="/templates/template.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">

    <ui:define name="contenido">

        <h2>Panel Principal</h2>

        <p:separator/>

        <!-- Indicadores -->

        <div class="grid">

            <div class="col-12 md:col-3">

                <p:panel styleClass="dashboard-card">

                    <h3>Socios</h3>

                    <h1>#{dashboardBean.totalSocios}</h1>

                </p:panel>

            </div>

            <div class="col-12 md:col-3">

                <p:panel styleClass="dashboard-card">

                    <h3>Cuentas</h3>

                    <h1>#{dashboardBean.totalCuentas}</h1>

                </p:panel>

            </div>

            <div class="col-12 md:col-3">

                <p:panel styleClass="dashboard-card">

                    <h3>Créditos</h3>

                    <h1>#{dashboardBean.totalCreditos}</h1>

                </p:panel>

            </div>

            <div class="col-12 md:col-3">

                <p:panel styleClass="dashboard-card">

                    <h3>Transacciones</h3>

                    <h1>#{dashboardBean.totalTransacciones}</h1>

                </p:panel>

            </div>

        </div>

        <br/>

        <!-- Totales -->

        <div class="grid">

            <div class="col-12 md:col-6">

                <p:panel header="Información General">

                    <h:panelGrid columns="2" cellpadding="8">

                        <h:outputText value="Total Depósitos"/>

                        <h:outputText value="#{dashboardBean.totalDepositos}">
                            <f:convertNumber type="currency" currencySymbol="$"/>
                        </h:outputText>

                        <h:outputText value="Total Retiros"/>

                        <h:outputText value="#{dashboardBean.totalRetiros}">
                            <f:convertNumber type="currency" currencySymbol="$"/>
                        </h:outputText>

                        <h:outputText value="Total Transferencias"/>

                        <h:outputText value="#{dashboardBean.totalTransferencias}">
                            <f:convertNumber type="currency" currencySymbol="$"/>
                        </h:outputText>

                        <h:outputText value="Créditos Activos"/>

                        <h:outputText value="#{dashboardBean.creditosActivos}"/>

                    </h:panelGrid>

                </p:panel>

            </div>

            <div class="col-12 md:col-6">

                <p:panel header="Accesos Rápidos">

                    <p:commandButton value="Personas"
                                     icon="pi pi-users"
                                     outcome="/persona"
                                     styleClass="ui-button-primary"/>

                    <br/><br/>

                    <p:commandButton value="Socios"
                                     icon="pi pi-id-card"
                                     outcome="/socio"
                                     styleClass="ui-button-success"/>

                    <br/><br/>

                    <p:commandButton value="Cuentas"
                                     icon="pi pi-wallet"
                                     outcome="/cuenta"
                                     styleClass="ui-button-help"/>

                    <br/><br/>

                    <p:commandButton value="Créditos"
                                     icon="pi pi-credit-card"
                                     outcome="/credito"
                                     styleClass="ui-button-warning"/>

                    <br/><br/>

                    <p:commandButton value="Transacciones"
                                     icon="pi pi-money-bill"
                                     outcome="/transaccion"
                                     styleClass="ui-button-info"/>

                </p:panel>

            </div>

        </div>

        <br/>

        <!-- Últimas transacciones -->

        <p:panel header="Últimas Transacciones">

            <p:dataTable value="#{dashboardBean.ultimasTransacciones}"
                         var="t"
                         paginator="true"
                         rows="5">

                <p:column headerText="Fecha">
                    <h:outputText value="#{t.fecha}">
                        <f:convertDateTime pattern="dd/MM/yyyy HH:mm"/>
                    </h:outputText>
                </p:column>

                <p:column headerText="Cuenta">
                    #{t.cuenta.numero}
                </p:column>

                <p:column headerText="Tipo">
                    #{t.tipoTransaccion.nombre}
                </p:column>

                <p:column headerText="Valor">
                    <h:outputText value="#{t.valor}">
                        <f:convertNumber type="currency"
                                         currencySymbol="$"/>
                    </h:outputText>
                </p:column>

            </p:dataTable>

        </p:panel>

    </ui:define>

</ui:composition>
