<!DOCTYPE html>

<ui:composition
        template="/template.xhtml"
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:p="http://primefaces.org/ui">
<link href="resources/css/dashboard.css" rel="stylesheet" type="text/css" />
    <ui:define name="contenido">

        <h2>Panel Principal</h2>

        <br/>

        <!-- Indicadores -->

        <div class="grid">

			<!-- Crear Usuario -->

		<div class="col-12 md:col-4">
		
		    <h:commandButton
		            value="Crear Usuario"
		            icon="pi pi-user-plus"
		            outcome=""
		            styleClass="ui-button-primary"
		            style="width:100%"/>
		
		</div>
		
		<!-- Administrar Usuarios -->
		
		<div class="col-12 md:col-4">
		
		    <h:commandButton
		            value="Administrar Usuarios"
		            icon="pi pi-users"
		            outcome="socio.xhtml?faces-redirect=true"
		            styleClass="ui-button-secondary"
		            style="width:100%"/>
		
		</div>
            <div class="col-12 md:col-3">

                <h:panelGroup styleClass="dashboard-card">

                    <h3>Socios</h3>

                    <h1>#{dashboardBean.totalSocios}</h1>

                </h:panelGroup>

            </div>

            <div class="col-12 md:col-3">

                <h:panelGroup styleClass="dashboard-card">

                    <h3>Cuentas</h3>

                    <h1>#{dashboardBean.totalCuentas}</h1>

                </h:panelGroup>

            </div>

            <div class="col-12 md:col-3">

                <h:panelGroup styleClass="dashboard-card">

                    <h3>Créditos</h3>

                    <h1>#{dashboardBean.totalCreditos}</h1>

                </h:panelGroup>

            </div>

            <div class="col-12 md:col-3">

                <h:panelGroup styleClass="dashboard-card">

                    <h3>Transacciones</h3>

                    <h1>#{dashboardBean.totalTransacciones}</h1>

                </h:panelGroup>

            </div>

        </div>

        <br/>

        <!-- Resumen -->

        <p:panel header="Resumen General">

            <h:panelGrid columns="2" cellpadding="8">

                <h:outputText value="Total Depósitos"/>

                <h:outputText value="#{dashboardBean.totalDepositos}">
                    <f:convertNumber type="currency" currencySymbol="$"/>
                </h:outputText>

                <h:outputText value="Total Retiros"/>

                <h:outputText value="#{dashboardBean.totalRetiros}">
                    <f:convertNumber type="currency" currencySymbol="$"/>
                </h:outputText>

                <h:outputText value="Total Transferencias"/>

                <h:outputText value="#{dashboardBean.totalTransferencias}">
                    <f:convertNumber type="currency" currencySymbol="$"/>
                </h:outputText>

                <h:outputText value="Créditos Activos"/>

                <h:outputText value="#{dashboardBean.creditosActivos}"/>

            </h:panelGrid>

        </p:panel>

        <br/>

        <!-- Accesos rápidos -->

        <p:panel header="Accesos Rápidos">

		    <h:panelGrid columns="3"
		                 cellpadding="10"
		                 width="100%">
		
		        <h:commandButton value="Personas"
		                         action="persona?faces-redirect=true"
		                         styleClass="btn btn-primary"/>
		
		        <h:commandButton value="Socios"
		                         action="socio?faces-redirect=true"
		                         styleClass="btn btn-success"/>
		
		        <h:commandButton value="Usuarios"
		                         action="usuario?faces-redirect=true"
		                         styleClass="btn btn-info"/>
		
		        <h:commandButton value="Cuentas"
		                         action="cuenta?faces-redirect=true"
		                         styleClass="btn btn-help"/>
		
		        <h:commandButton value="Créditos"
		                         action="credito?faces-redirect=true"
		                         styleClass="btn btn-warning"/>
		
		        <h:commandButton value="Transacciones"
		                         action="transaccion?faces-redirect=true"
		                         styleClass="btn btn-danger"/>
		
		        <h:commandButton value="Tipos de Transacción"
		                         action="tipoTransaccion?faces-redirect=true"
		                         styleClass="btn btn-secondary"/>
		
		        <h:commandButton value="Libro Diario"
		                         action="transaccionDiario?faces-redirect=true"
		                         styleClass="btn btn-secondary"/>
		
		        <h:commandButton value="Asientos Contables"
		                         action="asientoContable?faces-redirect=true"
		                         styleClass="btn btn-secondary"/>
		
		    </h:panelGrid>
		
		</p:panel>

        <br/>

        <!-- Últimas Transacciones -->

        <p:panel header="Últimas Transacciones">

            <p:dataTable value="#{dashboardBean.ultimasTransacciones}"
                         var="t"
                         paginator="true"
                         rows="5"
                         responsiveLayout="scroll">

                <p:column headerText="Fecha">

                    <h:outputText value="#{t.fecha}">
                        <f:convertDateTime pattern="dd/MM/yyyy HH:mm"/>
                    </h:outputText>

                </p:column>

                <p:column headerText="Cuenta">

                    #{t.cuenta.numeroCuenta}

                </p:column>

                <p:column headerText="Tipo">

                    #{t.tipoTransaccion.tipo}

                </p:column>

                <p:column headerText="Monto">

                    <h:outputText value="#{t.monto}">
                        <f:convertNumber type="currency"
                                         currencySymbol="$"/>
                    </h:outputText>

                </p:column>

            </p:dataTable>

        </p:panel>

    </ui:define>

</ui:composition>
